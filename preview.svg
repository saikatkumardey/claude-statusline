  <text x="497" y="57" font-family="'JetBrains Mono','Fira Code',Menlo,monospace" font-size="13" fill="#cdd6f4"> $0.042</text>
  <text x="551" y="57" font-family="'JetBrains Mono','Fira Code',Menlo,monospace" font-size="13" fill="#6c7086"> ⏱5m</text>
  <text x="592" y="57" font-family="'JetBrains Mono','Fira Code',Menlo,monospace" font-size="13" fill="#6c7086"> 12k↑</text>

