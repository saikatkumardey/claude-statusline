<svg xmlns="http://www.w3.org/2000/svg" width="860" height="110" viewBox="0 0 860 110">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <!-- Terminal background -->
  <rect width="860" height="110" rx="10" ry="10" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect width="860" height="30" rx="10" ry="10" fill="#313244"/>
  <rect y="18" width="860" height="12" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="15" r="5.5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5.5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5.5" fill="#28c840"/>
  <text x="430" y="20" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11.5" fill="#6c7086">claude-statusline</text>

  <!-- ── Row 1: full statusline ── -->
  <text x="18"  y="57" font-family="'JetBrains Mono','Fira Code',Menlo,monospace" font-size="13" font-weight="bold" fill="#89b4fa">~/work/myproject</text>
  <text x="153" y="57" font-family="'JetBrains Mono','Fira Code',Menlo,monospace" font-size="13" fill="#a6e3a1"> main ✔</text>
